name: Cloud
description: Endpoints for the Cloud.
endpoints:
  - httpMethods: [ "GET" ]
    uri: subscriptions
    metadata:
      title: Get Subscriptions
      description: Retrieve a list of subscriptions. USE https://subscription.production.vanmoof.cloud
      authenticated: true
    headers:
      Authorization: Bearer {APPLICATION_JWT_TOKEN}
      Host: subscription.production.vanmoof.cloud
    queryParameters:
      status:
        name: status
        description: Filter by subscription status (e.g. ACTIVE, EXPIRED).
        type: string
        required: false
    responses:
      - status: 200
        description: Success (No Subscriptions)
        content: []
      - status: 200
        description: Success
        content:
          - id: "{uuid}"
            vehicle_id: "{vehicle_id}"
            sku: "BETA-TRIAL"
            status: "EXPIRED"
            product: "FEATURE_SUBSCRIPTION"
            billing_cycle: "NONE"
            is_recurring: false
            created_at: "2026-01-01T01:00:00.000000Z"
            updated_at: "2026-01-01T01:00:00.000000Z"
            expired_at: "2026-01-01T01:00:00.000000Z"
            canceled_at: null
            next_billing_at: null
            trial_until: null
      - status: 401
        description: Unauthorized
        content: "Unauthorized"
  - httpMethods: [ "GET" ]
    uri: preferences
    metadata:
      title: Get Notification Preferences
      description: Retrieve notification preferences for the user. USE https://notification.production.vanmoof.cloud
      authenticated: true
    headers:
      Authorization: Bearer {APPLICATION_JWT_TOKEN}
      Host: notification.production.vanmoof.cloud
    responses:
      - status: 200
        description: Success
        content:
          languages:
            - en-US
          channels:
            push:
              vehicles:
                FrameNumber:
                  notifications:
                    alarm_state/1:
                      enabled: false
                    alarm_state/2:
                      enabled: true
                    alarm_state/3:
                      enabled: false
                    battery_charge/custom:
                      enabled: false
                      preferences:
                        soc: 25
                    battery_charge/empty:
                      enabled: true
                    battery_charge/full:
                      enabled: true
                    battery_charge/low:
                      enabled: true
                    location_update:
                      enabled: true
                    not_locked:
                      enabled: true
      - status: 401
        description: Unauthorized
        content: "Unauthorized"
  - httpMethods: [ "GET" ]
    uri: external/vehicles/{vehicle_id}/accesses
    metadata:
      title: Get Vehicle Accesses
      description: Retrieve access list for a specific vehicle, showing owners and guests. USE https://vehicleregistry.production.vanmoof.cloud
      authenticated: true
    headers:
      Authorization: Bearer {APPLICATION_JWT_TOKEN}
      Host: vehicleregistry.production.vanmoof.cloud
    urlParameters:
      vehicle_id:
        name: vehicle_id
        description: The frame number of the vehicle.
        type: string
        required: true
    responses:
      - status: 200
        description: Success
        content:
          vehicle_id: "{vehicle_id}"
          vehicle_access:
            - rider_id: "{uuid}"
              rider_name: "Rider Name"
              rider_email: "rider@vanmoof.com"
              owner_id: "{owner_uuid}"
              owner_name: "Owner Name"
              owner_email: "owner@vanmoof.com"
              role: "GUEST"
              expires_at: "2027-01-01T01:00:00.000000Z"
              starts_at: "2026-01-01T01:00:00.000000Z"
      - status: 401
        description: Unauthorized
        content: "Unauthorized"
  - httpMethods: [ "GET" ]
    uri: external/riders/{uuid}/invitations
    metadata:
      title: Get Rider Invitations
      description: Retrieve invitations for a specific rider. USE https://vehicleregistry.production.vanmoof.cloud
      authenticated: true
    headers:
      Authorization: Bearer {APPLICATION_JWT_TOKEN}
      Host: vehicleregistry.production.vanmoof.cloud
    responses:
      - status: 200
        description: Success
        content: []
  - httpMethods: [ "GET" ]
    uri: external/invitations
    metadata:
      title: Get External Invitations
      description: Retrieve all external invitations. USE https://vehicleregistry.production.vanmoof.cloud
      authenticated: true
    headers:
      Authorization: Bearer {APPLICATION_JWT_TOKEN}
      Host: vehicleregistry.production.vanmoof.cloud
    responses:
      - status: 200
        description: Success
        content: []
      - status: 401
        description: Unauthorized
        content: "Unauthorized"
  - httpMethods: [ "GET" ]
    uri: external/riders/{uuid}/vehicles
    metadata:
      title: Get Rider Vehicles
      description: Retrieve vehicles associated with a specific rider. USE https://vehicleregistry.production.vanmoof.cloud
      authenticated: true
    headers:
      Authorization: Bearer {APPLICATION_JWT_TOKEN}
      Host: vehicleregistry.production.vanmoof.cloud
    responses:
      - status: 200
        description: Success
        content:
          rider_id: "{uuid}"
          vehicle_access: []
      - status: 401
        description: Unauthorized
        content: "Unauthorized"
  - httpMethods: [ "GET" ]
    uri: v1/rider/bikes
    metadata:
      title: Bike Tracking
      description: Bike Tracking. USE https://biketracking.production.vanmoof.cloud
      authenticated: true
    headers:
      Authorization: Bearer {APPLICATION_JWT_TOKEN}
      Host: biketracking.production.vanmoof.cloud
    responses:
      - status: 200
        description: Success
        content:
          items: []
      - status: 401
        description: Unauthorized
        content: "Unauthorized"
  - httpMethods: [ "GET" ]
    uri: v2/states/{vehicle_id}
    metadata:
      title: Get Bike Tracking State
      description: Retrieve the tracking state of a specific vehicle. USE https://biketracking.production.vanmoof.cloud
      authenticated: true
    headers:
      Authorization: Bearer {APPLICATION_JWT_TOKEN}
      Host: biketracking.production.vanmoof.cloud
    urlParameters:
      vehicle_id:
        name: vehicle_id
        description: The frame number of the vehicle.
        type: string
        required: true
    responses:
      - status: 200
        description: Success
        content:
          id: "{uuid}"
          missing: "NOT_MISSING"
          tracking: "ENABLED"
          created_at: "2026-01-01T10:00:00.000000Z"
      - status: 401
        description: Unauthorized
        content: "Unauthorized"
  - httpMethods: [ "PATCH" ]
    uri: preferences
    metadata:
      title: Update Notification Preferences
      description: Update the notification preferences for the user. USE https://notification.production.vanmoof.cloud
      authenticated: true
    headers:
      Authorization: Bearer {APPLICATION_JWT_TOKEN}
      Content-Type: application/json; charset=utf-8
      Host: notification.production.vanmoof.cloud
    requestBody:
      content:
        languages:
          - en-US
    responses:
      - status: 200
        description: Success
        content:
          languages:
            - en-US
          channels:
            push:
              vehicles:
                FrameNumber:
                  notifications:
                    alarm_state/1:
                      enabled: false
                    alarm_state/2:
                      enabled: true
                    alarm_state/3:
                      enabled: false
                    battery_charge/custom:
                      enabled: false
                      preferences:
                        soc: 25
                    battery_charge/empty:
                      enabled: true
                    battery_charge/full:
                      enabled: true
                    battery_charge/low:
                      enabled: true
                    location_update:
                      enabled: true
                    not_locked:
                      enabled: true
      - status: 401
        description: Unauthorized
        content: "Unauthorized"
  - httpMethods: [ "DELETE" ]
    uri: channels
    metadata:
      title: Remove Notification Channel
      description: Remove a notification channel for the user. USE https://notification.production.vanmoof.cloud
      authenticated: true
    headers:
      Authorization: Bearer {APPLICATION_JWT_TOKEN}
      Content-Type: application/json; charset=utf-8
      Host: notification.production.vanmoof.cloud
    requestBody:
      content:
        address: "{DEVICE_ADDRESS}"
        channel: "PUSH"
    responses:
      - status: 204
        description: No Content
      - status: 401
        description: Unauthorized
        content: "Unauthorized"
  - httpMethods: [ "POST" ]
    uri: channels
    metadata:
      title: Create Notification Channel
      description: Create a new notification channel for the user. USE https://notification.production.vanmoof.cloud
      authenticated: true
    headers:
      Authorization: Bearer {APPLICATION_JWT_TOKEN}
      Content-Type: application/json; charset=utf-8
      Host: notification.production.vanmoof.cloud
    requestBody:
      content:
        address: "{DEVICE_ADDRESS}"
        channel: "PUSH"
    responses:
      - status: 201
        description: Created
        content:
          id: "{CHANNEL_ID}"
      - status: 401
        description: Unauthorized
        content: "Unauthorized"